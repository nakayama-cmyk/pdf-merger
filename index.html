  let colorIdx = 0;
  const palette = [
    { c: '#1B4B3A', g: 'rgba(27, 75, 58, 0.15)' },
    { c: '#2B59C3', g: 'rgba(43, 89, 195, 0.15)' },
    { c: '#8B4789', g: 'rgba(139, 71, 137, 0.15)' },
    { c: '#C97B2B', g: 'rgba(201, 123, 43, 0.15)' },
    { c: '#5A6F2E', g: 'rgba(90, 111, 46, 0.15)' },
    { c: '#9C2C5C', g: 'rgba(156, 44, 92, 0.15)' },
  ];

  const orderRank = computeOrderRank();

  // 描画対象を決定: グループは「代表1枚」だけ、単独ページはそのまま
  const renderItems = []; // {repIdx, isGroup, groupId, memberIdxs}
  const seenGroups = new Set();
  state.pageOrder.forEach((entry, idx) => {
    if (entry.groupId) {
      if (seenGroups.has(entry.groupId)) return;
      seenGroups.add(entry.groupId);
      const memberIdxs = state.pageOrder
        .map((p, i) => p.groupId === entry.groupId ? i : -1)
        .filter(i => i >= 0);
      renderItems.push({ repIdx: memberIdxs[0], isGroup: true, groupId: entry.groupId, memberIdxs });
    } else {
      renderItems.push({ repIdx: idx, isGroup: false, memberIdxs: [idx] });
    }
  });

  renderItems.forEach(item => {
    const entry = state.pageOrder[item.repIdx];
    const file = state.files.find(f => f.id === entry.fileId);
    if (!file) return;

    if (item.isGroup && !groupColors[item.groupId]) {
      groupColors[item.groupId] = palette[colorIdx % palette.length];
      colorIdx++;
    }

    const card = document.createElement('div');
    card.className = 'page-card'
      + (entry.included ? '' : ' excluded')
      + (state.selectedPageIdxs.has(item.repIdx) ? ' selected' : '');
    card.dataset.idx = item.repIdx;
    card.dataset.rotation = entry.rotation || 0;
    if (item.isGroup) {
      card.dataset.group = item.groupId;
      const col = groupColors[item.groupId];
      card.style.setProperty('--group-color', col.c);
      card.style.setProperty('--group-glow', col.g);
      card.dataset.groupPos = 'solo';

      // 重なり影を追加（裏に1〜3枚）
      const stackCount = Math.min(3, item.memberIdxs.length - 1);
      for (let s = stackCount; s >= 1; s--) {
        const shadow = document.createElement('div');
        shadow.className = 'stack-shadow s' + s;
        card.appendChild(shadow);
      }

      // 枚数バッジ
      const countBadge = document.createElement('div');
      countBadge.className = 'stack-count-badge';
      countBadge.textContent = item.memberIdxs.length + '枚';
      card.appendChild(countBadge);
    }

    // 順番バッジ（束の場合は範囲を示す）
    const orderBadge = document.createElement('div');
    orderBadge.className = 'page-card-order';
    if (item.isGroup) {
      const ranks = item.memberIdxs
        .filter(i => state.pageOrder[i].included)
        .map(i => orderRank.get(i))
        .filter(r => r !== undefined)
        .sort((a, b) => a - b);
      if (ranks.length > 0) {
        if (ranks.length === 1) orderBadge.textContent = String(ranks[0]).padStart(2, '0');
        else orderBadge.textContent = `${String(ranks[0]).padStart(2,'0')}-${String(ranks[ranks.length-1]).padStart(2,'0')}`;
      } else {
        orderBadge.textContent = '—';
        orderBadge.style.background = 'var(--muted)';
      }
    } else {
      if (entry.included) {
        const rank = orderRank.get(item.repIdx);
        orderBadge.textContent = String(rank).padStart(2, '0');
      } else {
        orderBadge.textContent = '—';
        orderBadge.style.background = 'var(--muted)';
      }
    }
    card.appendChild(orderBadge);

    // 注釈ありマーク（このページまたは束内のいずれかに注釈がある場合）
    const hasAnn = item.memberIdxs.some(i => {
      const e = state.pageOrder[i];
      return e && state.annotations[e.uid] && state.annotations[e.uid].length > 0;
    });
    if (hasAnn) {
      const annMark = document.createElement('div');
      annMark.style.cssText = 'position:absolute;top:32px;left:8px;background:#1B4B3A;color:white;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 5px;border-radius:2px;z-index:10;';
      annMark.textContent = '✎ 注釈';
      annMark.title = '注釈が含まれています';
      card.appendChild(annMark);
    }

    const rotBadge = document.createElement('div');
    rotBadge.className = 'rotation-badge';
    rotBadge.textContent = '↻ ' + (entry.rotation || 0) + '°';
    card.appendChild(rotBadge);

    const thumb = document.createElement('div');
    thumb.className = 'page-card-thumb';
    const cv = document.createElement('canvas');
    cv.dataset.fileId = file.id;
    cv.dataset.pageNum = entry.pageNum;
    cv.dataset.rotation = entry.rotation || 0;
    cv.dataset.entryUid = entry.uid || '';
    thumb.appendChild(cv);

    // メモリキャッシュがあれば即座にimg差し込み（非同期待ち不要）
    const memKey = `${file.id}_${entry.pageNum}_r${entry.rotation || 0}`;
    if (pageThumbCache.has(memKey)) {
      const cached = pageThumbCache.get(memKey);
      const dataUrl = cached.dataUrl || cached;
      const cachedW = cached.w || 0, cachedH = cached.h || 0;
      if (cachedW > 0 && cachedH > 0) {
        card.style.width = (cachedW + 12) + 'px';
        card.dataset.orientation = cachedW > cachedH ? 'landscape' : 'portrait';
      }
      cv.style.display = 'none';
      cv.width = 0; cv.height = 0;
      const img = document.createElement('img');
      img.className = 'thumb-img';
      img.src = dataUrl;
      thumb.appendChild(img);
    }

    card.appendChild(thumb);

    if (!item.isGroup) {
      // 単独ページのみ:出力切替
      const toggle = document.createElement('button');
      toggle.className = 'page-card-toggle';
      toggle.title = entry.included ? '出力から外す' : '出力に含める';
      toggle.textContent = entry.included ? '×' : '✓';
      toggle.addEventListener('mousedown', e => e.stopPropagation());
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        entry.included = !entry.included;
        refreshUI();
      });
      card.appendChild(toggle);
    }

    const info = document.createElement('div');
    info.className = 'page-card-info';
    if (item.isGroup) {
      const includedCount = item.memberIdxs.filter(i => state.pageOrder[i].included).length;
      info.innerHTML = `<span>束 ${includedCount}/${item.memberIdxs.length}</span><span>ダブルクリックで詳細</span>`;
    } else {
      info.innerHTML = `<span>P.${entry.pageNum}</span><span>${entry.included ? '出力' : '除外'}</span>`;
    }
    card.appendChild(info);

    // 束(グループ)の下にファイル名ラベル
    if (item.isGroup) {
      const label = document.createElement('div');
      label.className = 'group-name-label';
      const customName = state.groupNames[item.groupId];
      const displayName = customName || file.name.replace(/\.[^.]+$/, '');
      label.textContent = displayName;
      label.title = 'ダブルクリックで名前を編集';
      label.dataset.groupId = item.groupId;
      label.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        e.preventDefault();
        startGroupNameEdit(label, item.groupId, file.name);
      });
      label.addEventListener('mousedown', e => e.stopPropagation());
      label.addEventListener('pointerdown', e => e.stopPropagation());
      card.appendChild(label);
    } else {
      // 単独ページもファイル名を表示
      const label = document.createElement('div');
      label.className = 'group-name-label';
      label.textContent = file.name.replace(/\.[^.]+$/, '');
      label.title = file.name;
      label.style.pointerEvents = 'none';
      card.appendChild(label);
    }

    card.style.left = (entry.x || 0) + 'px';
    card.style.top = (entry.y || 0) + 'px';

    setupCardPointerHandlers(card, item.repIdx);
    boardContent.appendChild(card);
  });

  // ボードのスクロール領域を内容に合わせて拡張
  let maxR = 800, maxB = 600;
  state.pageOrder.forEach(p => {
    if ((p.x || 0) + CARD_W + 200 > maxR) maxR = (p.x || 0) + CARD_W + 200;
    if ((p.y || 0) + CARD_H + 200 > maxB) maxB = (p.y || 0) + CARD_H + 200;
  });
  boardContent.style.width = maxR + 'px';
  boardContent.style.height = maxB + 'px';

  // 描画完了後（少し遅らせて）、未描画のCanvasに対して1回だけ描画リクエスト
  setTimeout(() => {
    const pending = [];
    boardContent.querySelectorAll('.page-card-thumb canvas').forEach(cv => {
      const sibling = cv.nextElementSibling;
      if (sibling && sibling.tagName === 'IMG' && sibling.classList.contains('thumb-img') && sibling.src) return;
      if (cv.dataset.retried === '1') return;
      cv.dataset.retried = '1';
      const fileId = cv.dataset.fileId;
      const pageNum = parseInt(cv.dataset.pageNum, 10);
      const rotation = parseInt(cv.dataset.rotation || '0', 10);
      const file = state.files.find(f => f.id === fileId);
      if (file && pageNum) pending.push({ file, pageNum, rotation, cv });
    });
    // pageNum昇順でソートしてから投入（小さいページ番号を優先）
    pending.sort((a, b) => a.pageNum - b.pageNum);
    pending.forEach(({ file, pageNum, rotation, cv }) => {
      if (pageNum <= 6) {
        renderPageThumbnailNow(file, pageNum, cv, rotation).catch(() => {});
      } else {
        renderPageThumbnail(file, pageNum, cv, rotation);
      }
    });
  }, 300);
}

// 束のファイル名ラベル編集
function startGroupNameEdit(labelEl, groupId, fileName) {
  if (labelEl.classList.contains('editing')) return;
  const defaultName = fileName.replace(/\.[^.]+$/, '');
  const currentName = state.groupNames[groupId] || defaultName;
  labelEl.classList.add('editing');
  labelEl.contentEditable = 'true';
  labelEl.textContent = currentName;
  // 全選択
  const range = document.createRange();
  range.selectNodeContents(labelEl);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  labelEl.focus();

  let finished = false;
  const finish = (commit) => {
    if (finished) return;
    finished = true;
    labelEl.contentEditable = 'false';
    labelEl.classList.remove('editing');
    if (commit) {
      const newName = labelEl.textContent.trim();
      if (newName && newName !== defaultName) {
        state.groupNames[groupId] = newName;
      } else {
        delete state.groupNames[groupId];
      }
      // 自動保存・履歴に反映
      if (typeof scheduleSave === 'function') {
        try { scheduleSave(); } catch (_) {}
      }
    }
    // 表示を再描画（カスタム名 or 初期値）
    const finalDisplay = state.groupNames[groupId] || defaultName;
    labelEl.textContent = finalDisplay;
    window.getSelection().removeAllRanges();
  };

  labelEl.addEventListener('blur', () => finish(true), { once: true });
  labelEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      labelEl.blur();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      labelEl.textContent = currentName; // ロールバック
      finish(false);
    }
    e.stopPropagation();
  });
}

// ぶつかった順（Y→X）で出力順を決める
function computeOrderRank() {
  const rank = new Map();
  // 含まれているページだけ対象
  const included = state.pageOrder
    .map((p, i) => ({ p, i }))
    .filter(({ p }) => p.included);
  // ROW_TOLERANCE 以内のYは「同じ行」とみなす
  const ROW_TOLERANCE = 40;
  // まず Y で大雑把にソート
  included.sort((a, b) => (a.p.y || 0) - (b.p.y || 0));
  // 行ごとにグループ化
  const rows = [];
  for (const item of included) {
    let placed = false;
    for (const row of rows) {
      const rowY = row[0].p.y || 0;
      if (Math.abs((item.p.y || 0) - rowY) < ROW_TOLERANCE) {
        row.push(item);
        placed = true;
        break;
      }
    }
    if (!placed) rows.push([item]);
  }
  // 各行内をXでソート
  rows.forEach(row => row.sort((a, b) => (a.p.x || 0) - (b.p.x || 0)));
  // 連番付与
  let n = 1;
  rows.forEach(row => row.forEach(({ i }) => rank.set(i, n++)));
  return rank;
}

function handlePageClick(idx, e) {
  if (e.shiftKey && state.lastSelectedPageIdx !== null) {
    // 範囲選択
    const [from, to] = state.lastSelectedPageIdx < idx
      ? [state.lastSelectedPageIdx, idx]
      : [idx, state.lastSelectedPageIdx];
    for (let i = from; i <= to; i++) state.selectedPageIdxs.add(i);
  } else if (e.ctrlKey || e.metaKey) {
    if (state.selectedPageIdxs.has(idx)) state.selectedPageIdxs.delete(idx);
    else state.selectedPageIdxs.add(idx);
  } else {
    if (state.selectedPageIdxs.size === 1 && state.selectedPageIdxs.has(idx)) {
      state.selectedPageIdxs.clear();
    } else {
      state.selectedPageIdxs.clear();
      state.selectedPageIdxs.add(idx);
    }
  }
  state.lastSelectedPageIdx = idx;
  refreshUI();
}

const pageThumbCache = new Map();

// === サムネ遅延描画（パフォーマンス改善）===
// ボード上の見えていないカードのサムネは描画しない
let thumbObserver = null;
const pendingThumbCanvases = new WeakMap(); // canvas → {file, pageNum, rotation}
const thumbRenderQueue = [];
let thumbRenderRunning = false;

function getThumbObserver() {
  if (thumbObserver) return thumbObserver;
  thumbObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const cv = entry.target;
        const params = pendingThumbCanvases.get(cv);
        if (params) {
          pendingThumbCanvases.delete(cv);
          thumbObserver.unobserve(cv);
          enqueueThumbRender(cv, params);
        }
      }
    });
  }, { rootMargin: '200px' }); // 200px 手前から先読み
  return thumbObserver;
}

function enqueueThumbRender(canvas, params, priority = false) {
  const item = { canvas, params };
  if (priority) {
    // 優先アイテムはキューの先頭に割り込み
    thumbRenderQueue.unshift(item);
  } else {
    thumbRenderQueue.push(item);
  }
  if (!thumbRenderRunning) {
    runThumbRenderQueue();
  }
}

async function runThumbRenderQueue() {
  thumbRenderRunning = true;
  const CONCURRENCY = THUMB_WORKER_COUNT; // workerプールと同数で並列処理
  const RENDER_TIMEOUT = 10000;
  try {
    while (thumbRenderQueue.length > 0) {
      const batch = thumbRenderQueue.splice(0, CONCURRENCY);
      await Promise.all(batch.map(async ({ canvas, params }) => {
        // DOM に接続されていない場合、最大 500ms 待機してリトライ
        if (!canvas.isConnected) {
          await new Promise(r => setTimeout(r, 100));
          if (!canvas.isConnected) {
            await new Promise(r => setTimeout(r, 400));
            if (!canvas.isConnected) return;
          }
        }
        try {
          await Promise.race([
            renderPageThumbnailNow(params.file, params.pageNum, canvas, params.rotation),
            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), RENDER_TIMEOUT))
          ]);
        } catch (e) {
          console.warn('サムネ描画失敗:', e?.message || e, params.file?.name, params.pageNum);
        }
      }));
    }
  } catch (e) {
    console.warn('サムネキュー処理エラー:', e);
  } finally {
    thumbRenderRunning = false;
  }
}

// 公開API: 描画リクエスト（キャッシュあれば即時、なければキューで並列描画）
async function renderPageThumbnail(file, pageNum, canvas, rotation = 0) {
  const priority = pageNum <= 6;
  requestAnimationFrame(() => {
    enqueueThumbRender(canvas, { file, pageNum, rotation }, priority);
  });
}



// 白余白を非同期トリミング（行ごとにyield してUIブロックなし）
async function cropWhiteAsync(ctx, w, h) {
  const T = 248;
  const data = ctx.getImageData(0, 0, w, h).data;
  const isWhite = (y, step) => {
    for (let x = 0; x < w; x += step) {
      const i = (y * w + x) * 4;
      if (data[i] < T || data[i+1] < T || data[i+2] < T) return false;
    }
    return true;
  };
  let t = 0, b = h - 1;
  for (; t < h; t++) { if (!isWhite(t, 4)) break; }
  for (; b > t; b--) { if (!isWhite(b, 4)) break; }
  await new Promise(r => setTimeout(r, 0));
  const isWhiteCol = (x) => {
    for (let y = t; y <= b; y += 4) {
      const i = (y * w + x) * 4;
      if (data[i] < T || data[i+1] < T || data[i+2] < T) return false;
    }
    return true;
  };
  let l = 0, r2 = w - 1;
  for (; l < w; l++) { if (!isWhiteCol(l)) break; }
  for (; r2 > l; r2--) { if (!isWhiteCol(r2)) break; }
  const pad = 3;
  const x = Math.max(0, l - pad), y = Math.max(0, t - pad);
  const cw = Math.min(w, r2 + pad + 1) - x;
  const ch = Math.min(h, b + pad + 1) - y;
  if (cw <= 0 || ch <= 0 || (cw >= w * 0.95 && ch >= h * 0.95)) return null;
  return { x, y, w: cw, h: ch };
}

// 即時描画（IntersectionObserverのコールバック内で呼ばれる）
async function renderPageThumbnailNow(file, pageNum, canvas, rotation = 0) {
  const key = `${file.id}_${pageNum}_r${rotation}`;
  const dbKey = fileThumbKey(file, pageNum, rotation);
  if (!file || !file.pdf) return;

  const showAsImg = (dataUrl, w, h) => {
    if (!canvas.isConnected || !canvas.parentElement) return;
    const thumbDiv = canvas.parentElement;
    const card = canvas.closest('.page-card');
    if (card && w > 0 && h > 0) {
      card.style.width = (w + 12) + 'px';
      card.dataset.orientation = w > h ? 'landscape' : 'portrait';
    }
    // canvasは参照用に残すだけ（レイアウトには影響させない）
    let img = thumbDiv.querySelector('img.thumb-img');
    if (!img) {
      img = document.createElement('img');
      img.className = 'thumb-img';
      thumbDiv.appendChild(img);
    }
    img.src = dataUrl;
  };

  // 1. メモリキャッシュ（最速・同期）
  if (pageThumbCache.has(key)) {
    const c = pageThumbCache.get(key);
    const dataUrl = c.dataUrl || c;
    const cw = c.w || 0, ch = c.h || 0;
    if (cw > 0 && ch > 0) {
      showAsImg(dataUrl, cw, ch);
    } else {
      const probe = new Image();
      probe.onload = () => showAsImg(dataUrl, probe.naturalWidth, probe.naturalHeight);
      probe.src = dataUrl;
    }
    return;
  }
  try {
    // item.pdfを直接使う（getThumbPdfのworker初期化待ちを回避）
    const page = await file.pdf.getPage(pageNum);
    // PDFサイズ基準でスケール計算（固定枠なし）
    const baseVp = page.getViewport({ scale: 1, rotation });
    const scale = Math.min(120 / baseVp.width, 160 / baseVp.height);
    const viewport = page.getViewport({ scale, rotation });
    const offCanvas = document.createElement('canvas');
    offCanvas.width = Math.round(viewport.width);
    offCanvas.height = Math.round(viewport.height);
    const ctx = offCanvas.getContext('2d');
    ctx.clearRect(0, 0, offCanvas.width, offCanvas.height);
    await page.render({ canvasContext: ctx, viewport }).promise;
    const dataUrl = offCanvas.toDataURL('image/jpeg', 0.85);
    pageThumbCache.set(key, { dataUrl, w: offCanvas.width, h: offCanvas.height });
    showAsImg(dataUrl, offCanvas.width, offCanvas.height);
    saveThumbToDB(dbKey, dataUrl);

    // 注釈があれば非同期で上書き
    const entryUid = canvas.dataset.entryUid;
    const anns = entryUid && state.annotations[entryUid];
    if (anns && anns.length > 0) {
      overlayAnnotationsOnThumb(canvas, file, page, dataUrl, offCanvas.width, offCanvas.height, scale, key, dbKey, entryUid, anns);
    }
  } catch (e) {
    console.warn('ページサムネ生成失敗:', file?.name, pageNum, e);
  }
}

async function removeFile(fileId) {
  const file = state.files.find(f => f.id === fileId);
  if (!file) return;
  const ok = await confirmDelete(`「${file.name}」を削除しますか？`, 'ファイルを削除');
  if (!ok) return;
  const pages = state.pageOrder.filter(p => p.fileId === fileId);
  trash.push({ file, pages, deletedAt: Date.now() });
  clearThumbPdfPool(fileId);
  state.files = state.files.filter(f => f.id !== fileId);
  state.pageOrder = state.pageOrder.filter(p => p.fileId !== fileId);
  refreshUI();
  updateTrashUI();
  scheduleSave();
}

function updateTrashUI() {
  const badge = document.getElementById('trash-badge');
  const list = document.getElementById('trash-list');
  if (!badge || !list) return;
  badge.textContent = trash.length;
  badge.style.display = trash.length > 0 ? 'flex' : 'none';
  if (trash.length === 0) {
    list.innerHTML = '<div class="trash-empty">ゴミ箱は空です</div>';
    return;
  }
  list.innerHTML = '';
  [...trash].reverse().forEach((item, ri) => {
    const idx = trash.length - 1 - ri;
    const div = document.createElement('div');
    div.className = 'trash-item';
    const name = document.createElement('span');
    name.className = 'trash-item-name';
    name.textContent = item.file.name;
    name.title = item.file.name;
    const btn = document.createElement('button');
    btn.className = 'trash-restore-btn';
    btn.textContent = '復元';
    btn.addEventListener('click', () => {
      const it = trash.splice(idx, 1)[0];
      state.files.push(it.file);
      it.pages.forEach(p => state.pageOrder.push(p));
      refreshUI();
      updateTrashUI();
      scheduleSave();
    });
    div.appendChild(name);
    div.appendChild(btn);
    list.appendChild(div);
  });

  // ナビバーのゴミ箱リストも同期（イベントリスナーごと再生成）
  const navList = document.getElementById('trash-list-nav');
  if (navList) {
    navList.innerHTML = '';
    if (trash.length === 0) {
      navList.innerHTML = '<div class="trash-empty">ゴミ箱は空です</div>';
    } else {
      [...trash].reverse().forEach((item, ri) => {
        const idx = trash.length - 1 - ri;
        const div = document.createElement('div');
        div.className = 'trash-item';
        const name = document.createElement('span');
        name.className = 'trash-item-name';
        name.textContent = item.file.name;
        name.title = item.file.name;
        const btn = document.createElement('button');
        btn.className = 'trash-restore-btn';
        btn.textContent = '復元';
        btn.addEventListener('click', () => {
          const it = trash.splice(idx, 1)[0];
          state.files.push(it.file);
          it.pages.forEach(p => state.pageOrder.push(p));
          refreshUI();
          updateTrashUI();
          scheduleSave();
        });
        div.appendChild(name);
        div.appendChild(btn);
        navList.appendChild(div);
      });
    }
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

// ── Drag & drop reordering ───────────────────────────
// ── Pointer-based drag (free positioning) ────────────
let dragSession = null;
let lastClickInfo = null; // ダブルクリック検出用

function setupCardPointerHandlers(card, idx) {
  // 右クリックメニュー
  card.addEventListener('contextmenu', e => {
    showBoardContextMenu(e, idx);
  });

  card.addEventListener('pointerdown', e => {
    // ボタン上は無視
    if (e.target.closest('.page-card-toggle') || e.target.closest('button')) return;
    if (e.button !== 0) return;

    // === ダブルクリック検出（pointerdown段階で行う） ===
    const now = Date.now();
    const isDouble = lastClickInfo
      && lastClickInfo.idx === idx
      && (now - lastClickInfo.time) < 350;
    lastClickInfo = { idx: idx, time: now };

    const entry = state.pageOrder[idx];
    if (isDouble && entry) {
      // ダブルクリック → 展開ビューアを開く
      e.preventDefault();
      e.stopPropagation();
      lastClickInfo = null;
      // シングルページの場合は、その場で1ページの束に変換
      if (!entry.groupId) {
        entry.groupId = 'g_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
      }
      openGroupExpansion(entry.groupId);
      return;
    }

    // クリック扱いか判定するための初期データ
    const startX = e.clientX;
    const startY = e.clientY;
    if (!entry) return;

    // ドラッグ対象を決定: 選択中ならそれ全部、グループに属するならグループ全体、単独なら自分のみ
    let toMove;
    if (state.selectedPageIdxs.has(idx) && state.selectedPageIdxs.size > 0) {
      toMove = [...state.selectedPageIdxs];
    } else if (entry.groupId) {
      toMove = state.pageOrder
        .map((p, i) => p.groupId === entry.groupId ? i : -1)
        .filter(i => i >= 0);
    } else {
      toMove = [idx];
    }

    // 元の座標を記録
    const origPositions = toMove.map(i => ({
      idx: i,
      x: state.pageOrder[i].x || 0,
      y: state.pageOrder[i].y || 0,
    }));

    // ボード上のpointer位置を取得（board-content上の絶対座標）
    const getBoardPos = (ev) => {
      const rect = boardContent.getBoundingClientRect();
      return {
        x: ev.clientX - rect.left,
        y: ev.clientY - rect.top,
      };
    };

    const startBoardPos = getBoardPos(e);
    // つかんだ点とカード左上のオフセット
    const grabOffset = {
      x: startBoardPos.x - (entry.x || 0),
      y: startBoardPos.y - (entry.y || 0),
    };

    dragSession = {
      idxs: toMove,
      origPositions,
      startX, startY,
      startBoardPos,
      grabOffset,
      moved: false,
      primaryIdx: idx,
      shiftKey: e.shiftKey,
      ctrlKey: e.ctrlKey || e.metaKey,
      getBoardPos,
    };

    // dragging クラスを付与
    toMove.forEach(i => {
      const el = boardContent.querySelector(`[data-idx="${i}"]`);
      if (el) el.classList.add('dragging');
    });
    pageGrid.classList.add('dragging-card');

    card.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  card.addEventListener('pointermove', e => {
    if (!dragSession) return;
    // viewport座標変化での「動いた」判定
    const dxV = e.clientX - dragSession.startX;
    const dyV = e.clientY - dragSession.startY;
    if (!dragSession.moved && (Math.abs(dxV) > 4 || Math.abs(dyV) > 4)) {
      dragSession.moved = true;
    }
    if (dragSession.moved) {
      // board-content上の現在位置を取得
      const cur = dragSession.getBoardPos(e);
      // primary の新しい位置 = カーソル位置 - つかんだオフセット
      const newPrimaryX = cur.x - dragSession.grabOffset.x;
      const newPrimaryY = cur.y - dragSession.grabOffset.y;
      // primaryの元の座標との差分を計算
      const primary = state.pageOrder[dragSession.primaryIdx];
      const origPrimary = dragSession.origPositions.find(o => o.idx === dragSession.primaryIdx);
      const deltaX = newPrimaryX - (origPrimary ? origPrimary.x : (primary.x || 0));
      const deltaY = newPrimaryY - (origPrimary ? origPrimary.y : (primary.y || 0));
      // 全対象を delta だけ動かす
      dragSession.origPositions.forEach(orig => {
        const ent = state.pageOrder[orig.idx];
        if (!ent) return;
        ent.x = orig.x + deltaX;
        ent.y = orig.y + deltaY;
        const el = boardContent.querySelector(`[data-idx="${orig.idx}"]`);
        if (el) {
          el.style.left = ent.x + 'px';
          el.style.top = ent.y + 'px';
        }
      });
    }
  });

  card.addEventListener('pointerup', e => {
    if (!dragSession) return;
    const session = dragSession;
    dragSession = null;
    try { card.releasePointerCapture(e.pointerId); } catch (_) {}

    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    pageGrid.classList.remove('dragging-card');

    if (!session.moved) {
      // 通常のクリック → 選択処理
      handlePageClick(session.primaryIdx, {
        shiftKey: session.shiftKey,
        ctrlKey: session.ctrlKey,
        metaKey: session.ctrlKey,
      });
      return;
    }

    handleDropAtPosition(session, e);
    refreshUI();
  });

  card.addEventListener('pointercancel', () => {
    if (dragSession) {
      // 元の位置に戻す
      dragSession.origPositions.forEach(orig => {
        const ent = state.pageOrder[orig.idx];
        if (!ent) return;
        ent.x = orig.x;
        ent.y = orig.y;
      });
      dragSession = null;
      document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
      pageGrid.classList.remove('dragging-card');
      refreshUI();
    }
  });
}

// ドロップした位置に他のカードと重なっていれば、そのカードの束に合流
function handleDropAtPosition(session, evt) {
  const primary = state.pageOrder[session.primaryIdx];
  if (!primary) return;

  // ドラッグした代表の矩形
  const dragRect = {
    x: primary.x || 0,
    y: primary.y || 0,
    w: CARD_W,
    h: CARD_H,
  };

  // 移動対象セット（束のメンバー全員のidxを含む）
  const movingSet = new Set(session.idxs);
  // 移動対象の groupId も除外（束自体に「合流」できないように）
  const movingGroupIds = new Set();
  session.idxs.forEach(i => {
    const e = state.pageOrder[i];
    if (e && e.groupId) movingGroupIds.add(e.groupId);
  });

  // 各「束の代表」または「単独ページ」を候補として、矩形重なりが最大のものを選ぶ
  const seenGroups = new Set();
  let best = null;
  let bestOverlap = 0;
  for (let i = 0; i < state.pageOrder.length; i++) {
    if (movingSet.has(i)) continue;
    const p = state.pageOrder[i];
    if (!p) continue;
    if (p.groupId && movingGroupIds.has(p.groupId)) continue;
    // 束の代表(先頭)だけを判定対象にする
    if (p.groupId) {
      if (seenGroups.has(p.groupId)) continue;
      seenGroups.add(p.groupId);
    }
    const r2 = { x: p.x || 0, y: p.y || 0, w: CARD_W, h: CARD_H };
    const ox = Math.max(0, Math.min(dragRect.x + dragRect.w, r2.x + r2.w) - Math.max(dragRect.x, r2.x));
    const oy = Math.max(0, Math.min(dragRect.y + dragRect.h, r2.y + r2.h) - Math.max(dragRect.y, r2.y));
    const overlap = ox * oy;
    // 重なりがカード面積の20%以上で候補に（ゆるい判定）
    const threshold = CARD_W * CARD_H * 0.2;
    if (overlap > threshold && overlap > bestOverlap) {
      bestOverlap = overlap;
      best = { idx: i, entry: p };
    }
  }

  if (!best) return; // 重なりなし: 自由配置のまま

  // 合流処理
  let gid = best.entry.groupId;
  if (!gid) {
    gid = 'g_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
    best.entry.groupId = gid;
  }
  session.idxs.forEach(i => {
    const ent = state.pageOrder[i];
    if (ent) ent.groupId = gid;
  });

  // ドラッグ側が先頭になるようpageOrderを並び替え
  const dragged = state.pageOrder.filter((p, i) => session.idxs.includes(i));
  const rest = state.pageOrder.filter((p, i) => !session.idxs.includes(i));
  // restの中でgidグループの先頭位置を探す
  const firstRestGroupIdx = rest.findIndex(p => p.groupId === gid);
  if (firstRestGroupIdx >= 0) {
    // ドラッグ側をそのグループの先頭に挿入
    rest.splice(firstRestGroupIdx, 0, ...dragged);
    state.pageOrder = rest;
  }

  const groupPages = state.pageOrder.filter(p => p.groupId === gid);
  const baseX = best.entry.x || 0;
  const baseY = best.entry.y || 0;
  groupPages.forEach(p => {
    p.x = baseX;
    p.y = baseY;
  });
}


// ── 束の展開モーダル ─────────────────────────────────
// ── 束の展開ビューア ──────────────────────────────────
function openGroupExpansion(groupId) {
  // ビューアを開く前に現在の状態をundoスタックに確定保存
  const lightPo = state.pageOrder.map(p => ({
    uid: p.uid, fileId: p.fileId, pageNum: p.pageNum,
    included: p.included, rotation: p.rotation,
    groupId: p.groupId, x: p.x, y: p.y,
  }));
  const snap = JSON.stringify({ po: lightPo, ann: state.annotations, gn: state.groupNames, fileIds: state.files.map(f => f.id) });
  if (snap !== lastSnapshotJson) {
    pushHistorySnapshot(snap);
    lastSnapshotJson = snap;
    updateHistoryButtons();
  }

  state.expandedGroupId = groupId;
  state.viewerMemberIdx = 0;
  state.selectedPageIdxs.clear(); // ビューアを開いたらボード選択をクリア
  state.viewerZoom = 0; // 0=初回フィット待ち

  // ビューアを開いた瞬間に該当グループの全ページを並列プリベイク
  const members = state.pageOrder.filter(p => p.groupId === groupId);
  members.forEach(p => {
    const file = state.files.find(f => f.id === p.fileId);
    if (!file) return;
    const memKey = `${file.id}_${p.pageNum}_r${p.rotation || 0}`;
    if (pageThumbCache.has(memKey)) return; // 既にある
    // 即座に並列描画開始（awaitしない）
    (async () => {
      try {
        const dbKey = fileThumbKey(file, p.pageNum, p.rotation || 0);
        const db = await loadThumbFromDB(dbKey);
        if (db) { pageThumbCache.set(memKey, db); applyThumbToCard(file.id, p.pageNum, p.rotation || 0, db); return; }
        const thumbPdf = await getThumbPdf(file);
        const page = await thumbPdf.getPage(p.pageNum);
        const rot = p.rotation || 0;
        const baseVp = page.getViewport({ scale: 1, rotation: rot });
        const baseVp2 = page.getViewport({ scale: 1, rotation: rot });
        const scale = Math.min(270 / baseVp2.width, 240 / baseVp2.height);
        const viewport = page.getViewport({ scale, rotation: rot });
        const oc = document.createElement('canvas');
        oc.width = Math.round(viewport.width); oc.height = Math.round(viewport.height);
        const ctx = oc.getContext('2d');
        ctx.clearRect(0, 0, oc.width, oc.height);
        await page.render({ canvasContext: ctx, viewport }).promise;
        const dataUrl = oc.toDataURL('image/jpeg', 0.82);
        pageThumbCache.set(memKey, { dataUrl, w: oc.width, h: oc.height });
        saveThumbToDB(dbKey, dataUrl);
        applyThumbToCard(file.id, p.pageNum, p.rotation || 0, dataUrl, oc.width, oc.height);
      } catch(e) {}
    })();
  });

  // 最初のページのgetPageを先行投入（renderViewerMainPageの待ち時間を削減）
  const firstMember = members[0];
  if (firstMember) {
    const firstFile = state.files.find(f => f.id === firstMember.fileId);
    if (firstFile?._viewerPdf) {
      firstFile._viewerPdf.then(pdf => pdf.getPage(firstMember.pageNum)).catch(() => {});
    }
  }

  renderExpansionModal();
}

function closeGroupExpansion() {
  state.expandedGroupId = null;
  state.viewerZoom = 1.0;
  fontAnalyzeMode = 'all';
  const existing = document.getElementById('expanded-modal');
  if (existing) existing.remove();
  // ビューアを閉じた時点の状態を履歴に積む
  const lightPo = state.pageOrder.map(p => ({
    uid: p.uid, fileId: p.fileId, pageNum: p.pageNum,
    included: p.included, rotation: p.rotation,
    groupId: p.groupId, x: p.x, y: p.y,
  }));
  const snap = JSON.stringify({ po: lightPo, ann: state.annotations, gn: state.groupNames, fileIds: state.files.map(f => f.id) });
  if (snap !== lastSnapshotJson) {
    pushHistorySnapshot(snap);
    lastSnapshotJson = snap;
    updateHistoryButtons();
    scheduleSave();
  }
  refreshUI();
}

// 表示中の束のメンバー(ページ)情報を取得 → [{p, idx}]
function getExpandedMembers() {
  if (!state.expandedGroupId) return [];
  return state.pageOrder
    .map((p, idx) => ({ p, idx }))
    .filter(x => x.p.groupId === state.expandedGroupId);
}

// ビューア内のサムネドラッグで束のメンバー順を入替
function reorderViewerMembers(fromMemberIdx, toMemberIdx) {
  const members = getExpandedMembers();
  if (fromMemberIdx < 0 || fromMemberIdx >= members.length) return;
  if (toMemberIdx < 0 || toMemberIdx > members.length) return;
  if (fromMemberIdx === toMemberIdx) return;

  // メンバーを束のグローバルなpageOrder上で移動
  const fromGlobalIdx = members[fromMemberIdx].idx;
  let toGlobalIdx;
  if (toMemberIdx >= members.length) {
    toGlobalIdx = members[members.length - 1].idx + 1;
  } else {
    toGlobalIdx = members[toMemberIdx].idx;
  }

  const [moved] = state.pageOrder.splice(fromGlobalIdx, 1);
  if (fromGlobalIdx < toGlobalIdx) toGlobalIdx--;
  state.pageOrder.splice(toGlobalIdx, 0, moved);

  // ビューアの現在表示メンバーを移動先に追従
  state.viewerMemberIdx = toMemberIdx > fromMemberIdx ? toMemberIdx - 1 : toMemberIdx;
  const newMembers = getExpandedMembers();
  if (state.viewerMemberIdx >= newMembers.length) state.viewerMemberIdx = newMembers.length - 1;
  if (state.viewerMemberIdx < 0) state.viewerMemberIdx = 0;

  renderExpansionModal();
  refreshUI();
  statusText.textContent = `${fromMemberIdx + 1}枚目を${state.viewerMemberIdx + 1}枚目に移動`;
}

// 現在のメンバーインデックスを正規化
function clampViewerMemberIdx() {
  const members = getExpandedMembers();
  if (members.length === 0) {
    closeGroupExpansion();
    return null;
  }
  if (state.viewerMemberIdx < 0) state.viewerMemberIdx = 0;
  if (state.viewerMemberIdx >= members.length) state.viewerMemberIdx = members.length - 1;
  return members;
}

function renderExpansionModal() {
  const existing = document.getElementById('expanded-modal');
  if (existing) existing.remove();

  if (!state.expandedGroupId) return;
  const members = clampViewerMemberIdx();
  if (!members) return;

  const current = members[state.viewerMemberIdx];
  const currentEntry = current.p;
  const currentFile = state.files.find(f => f.id === currentEntry.fileId);

  const modal = document.createElement('div');
  modal.id = 'expanded-modal';
  modal.className = 'expanded-modal';

  const content = document.createElement('div');
  content.className = 'expanded-content';

  // ── ヘッダ（タイトル＋ツールバー＋閉じる）
  const header = document.createElement('div');
  header.className = 'expanded-header';

  const titleArea = document.createElement('div');
  titleArea.style.cssText = 'display:flex;align-items:baseline;gap:12px;';
  const fileName = currentFile ? currentFile.name : '束';
  titleArea.innerHTML = `
    <h2>束の中身</h2>
    <span class="meta">${escapeHtml(fileName)} 全${members.length}枚</span>
  `;
  header.appendChild(titleArea);

  content.appendChild(header);

  // ── 注釈ツールバー（描画ツール）
  content.appendChild(buildAnnToolRow());

  // ── 本体（左サムネ + 中央ビューア + 右パネル）
  const body = document.createElement('div');
  body.className = 'expanded-body';

  // 左サムネ
  const thumbsCol = document.createElement('div');
  thumbsCol.className = 'viewer-thumbs';
  members.forEach((m, mi) => {
    const t = document.createElement('div');
    t.className = 'viewer-thumb' + (mi === state.viewerMemberIdx ? ' current' : '') + (m.p.included ? '' : ' excluded');
    t.title = `${mi + 1}枚目（ドラッグして並び替え）`;
    t.dataset.memberIdx = mi;

    const wrap = document.createElement('div');
    wrap.className = 'viewer-thumb-canvas-wrap';
    const cv = document.createElement('canvas');
    cv.dataset.fileId = m.p.fileId;
    cv.dataset.pageNum = m.p.pageNum;
    cv.dataset.rotation = m.p.rotation || 0;
    cv.dataset.entryUid = m.p.uid || '';
    wrap.appendChild(cv);
    t.appendChild(wrap);

    const label = document.createElement('div');
    label.className = 'viewer-thumb-label';
    label.textContent = `${mi + 1} / ${members.length}`;
    t.appendChild(label);

    t.addEventListener('click', () => {
      // ドラッグ中はクリックを無視（HTML5 D&Dの後にclickが発火しない場合もあるが念のため）
      if (t.classList.contains('thumb-drag-source')) return;
      state.viewerMemberIdx = mi;
      renderExpansionModal();
    });
    t.addEventListener('contextmenu', e => {
      showViewerContextMenu(e, mi);
    });

    // === Pointer Eventsによる並び替え（安定版）===
    let thumbDragState = null;
    t.addEventListener('pointerdown', e => {
      if (e.button !== 0) return;
      if (e.target.tagName === 'BUTTON') return;
      thumbDragState = { fromIdx: mi, moved: false, startY: e.clientY, dropTarget: null, dropBefore: true };
      t.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    t.addEventListener('pointermove', e => {
      if (!thumbDragState || thumbDragState.fromIdx !== mi) return;
      if (!thumbDragState.moved && Math.abs(e.clientY - thumbDragState.startY) > 4) {
        thumbDragState.moved = true;
        t.classList.add('thumb-drag-source');
      }
      if (!thumbDragState.moved) return;
      const allThumbs = [...thumbsCol.querySelectorAll('.viewer-thumb')];
      allThumbs.forEach(el => el.classList.remove('drop-before', 'drop-after'));
      thumbDragState.dropTarget = null;
      const target = allThumbs.find(el => {
        if (el === t) return false;
        const r = el.getBoundingClientRect();
        return e.clientY >= r.top && e.clientY <= r.bottom;
      });
      if (target) {
        const r = target.getBoundingClientRect();
        const isUpper = (e.clientY - r.top) < r.height / 2;
        target.classList.toggle('drop-before', isUpper);
        target.classList.toggle('drop-after', !isUpper);
        thumbDragState.dropTarget = parseInt(target.dataset.memberIdx, 10);
        thumbDragState.dropBefore = isUpper;
      }
    });
    t.addEventListener('pointerup', e => {
      if (!thumbDragState || thumbDragState.fromIdx !== mi) return;
      const ds = thumbDragState;
      thumbDragState = null;
      try { t.releasePointerCapture(e.pointerId); } catch(_) {}
      t.classList.remove('thumb-drag-source');
      thumbsCol.querySelectorAll('.viewer-thumb').forEach(el => el.classList.remove('drop-before', 'drop-after'));
      if (!ds.moved || ds.dropTarget === null) return;
      const insertAt = ds.dropBefore ? ds.dropTarget : ds.dropTarget + 1;
      reorderViewerMembers(ds.fromIdx, insertAt);
    });
    t.addEventListener('pointercancel', () => {
      thumbDragState = null;
      t.classList.remove('thumb-drag-source');
      thumbsCol.querySelectorAll('.viewer-thumb').forEach(el => el.classList.remove('drop-before', 'drop-after'));
    });

    thumbsCol.appendChild(t);
  });
  body.appendChild(thumbsCol);

  // 中央ビューア
  const main = document.createElement('div');
  main.className = 'viewer-main';
  const zoomWrap = document.createElement('div');
  zoomWrap.id = 'viewer-zoom-wrap';
  zoomWrap.style.cssText = 'display:flex;justify-content:center;align-items:flex-start;min-width:0;';
  const pageWrap = document.createElement('div');
  pageWrap.className = 'viewer-page-wrap';
  pageWrap.id = 'viewer-page-wrap';
  const mainCanvas = document.createElement('canvas');
  mainCanvas.id = 'viewer-pdf-canvas';
  pageWrap.appendChild(mainCanvas);
  // 注釈オーバーレイ
  const overlayCanvas = document.createElement('canvas');
  overlayCanvas.className = 'ann-overlay tool-' + state.tool;
  overlayCanvas.id = 'viewer-ann-overlay';
  pageWrap.appendChild(overlayCanvas);
  // 中央ページの右クリック → 現在表示中ページに対するメニュー
  pageWrap.addEventListener('contextmenu', e => {
    showViewerContextMenu(e, state.viewerMemberIdx);
  });
  zoomWrap.appendChild(pageWrap);
  main.appendChild(zoomWrap);

  // ズームコントロール（右下に固定）
  const zoomCtrl = document.createElement('div');
  zoomCtrl.className = 'viewer-zoom-ctrl';
  const zoomOut = document.createElement('button');
  zoomOut.className = 'viewer-zoom-btn';
  zoomOut.title = '縮小 (Ctrl+ホイール)';
  zoomOut.textContent = '−';
  zoomOut.addEventListener('click', () => applyViewerZoom(state.viewerZoom - 0.1));
  const zoomPct = document.createElement('div');
  zoomPct.className = 'viewer-zoom-pct';
  zoomPct.title = 'クリックで100%に戻す';
  zoomPct.textContent = Math.round(state.viewerZoom * 100) + '%';
  zoomPct.addEventListener('click', () => applyViewerZoom(1.0));
  const zoomIn = document.createElement('button');
  zoomIn.className = 'viewer-zoom-btn';
  zoomIn.title = '拡大 (Ctrl+ホイール)';
  zoomIn.textContent = '+';
  zoomIn.addEventListener('click', () => applyViewerZoom(state.viewerZoom + 0.1));
  zoomCtrl.appendChild(zoomOut);
  zoomCtrl.appendChild(zoomPct);
  zoomCtrl.appendChild(zoomIn);
  main.appendChild(zoomCtrl);

  // Ctrl+ホイールでズーム（mainエリア内のみ）
  main.addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const delta = -Math.sign(e.deltaY) * 0.1;
      applyViewerZoom(state.viewerZoom + delta);
    }
  }, { passive: false });

  body.appendChild(main);

  // ── 右パネル（プロパティ・印鑑）
  body.appendChild(buildAnnPanel());

  content.appendChild(body);

  // ── フッター（ページインジケータ）
  const footer = document.createElement('div');
  footer.className = 'expanded-footer';
  const includedCount = members.filter(m => m.p.included).length;
  footer.innerHTML = `
    <span>サムネイルから直接ジャンプ可能 / ←→ キーでページ送り</span>
    <span>${includedCount}/${members.length} 枚が出力対象</span>
  `;

  // 中央のページ送りエリア
  const pageNav = document.createElement('div');
  pageNav.className = 'viewer-pagenav';
  const navPrev = document.createElement('button');
  navPrev.textContent = '◀';
  navPrev.disabled = state.viewerMemberIdx === 0;
  navPrev.addEventListener('click', () => {
    state.viewerMemberIdx--;
    prefetchViewerPage(members, state.viewerMemberIdx - 1);
    renderExpansionModal();
  });
  const navInd = document.createElement('span');
  navInd.className = 'viewer-pageindicator';
  navInd.textContent = `${state.viewerMemberIdx + 1} / ${members.length}`;
  const navNext = document.createElement('button');
  navNext.textContent = '▶';
  navNext.disabled = state.viewerMemberIdx >= members.length - 1;
  navNext.addEventListener('click', () => {
    state.viewerMemberIdx++;
    prefetchViewerPage(members, state.viewerMemberIdx + 1);
    renderExpansionModal();
  });
  pageNav.appendChild(navPrev);
  pageNav.appendChild(navInd);
  pageNav.appendChild(navNext);

  // フッターの中央にページナビ
  const footerCenter = document.createElement('div');
  footerCenter.appendChild(pageNav);
  // フッターを 左 / 中央 / 右 の3カラムに
  footer.innerHTML = '';
  const fL = document.createElement('span');
  fL.textContent = 'サムネイルから直接ジャンプ / ←→ キーでページ送り';
  const fR = document.createElement('span');
  fR.textContent = `${includedCount}/${members.length} 枚が出力対象`;
  footer.style.display = 'grid';
  footer.style.gridTemplateColumns = '1fr auto 1fr';
  footer.appendChild(fL);
  footer.appendChild(pageNav);
  footer.appendChild(fR);
  fR.style.textAlign = 'right';

  content.appendChild(footer);

  modal.appendChild(content);
  document.body.appendChild(modal);

  // モーダルDOMに追加後、メモリキャッシュがあれば即表示・なければキューへ
  requestAnimationFrame(() => {
    modal.querySelectorAll('.viewer-thumb-canvas-wrap canvas').forEach(cv => {
      const fileId = cv.dataset.fileId;
      const pageNum = parseInt(cv.dataset.pageNum, 10);
      const rotation = parseInt(cv.dataset.rotation || '0', 10);
      const file = state.files.find(f => f.id === fileId);
      if (!file || !pageNum) return;

      const memKey = `${fileId}_${pageNum}_r${rotation}`;
      if (pageThumbCache.has(memKey)) {
        // キャッシュあり → 即差し込み
        const cached = pageThumbCache.get(memKey);
        const dataUrl = cached.dataUrl || cached;
        let img = cv.parentElement.querySelector('img.thumb-img');
        if (!img) {
          img = document.createElement('img');
          img.className = 'thumb-img';
          cv.parentElement.appendChild(img);
        }
        img.src = dataUrl;
      } else {
        renderPageThumbnailNow(file, pageNum, cv, rotation).catch(() => {});
      }
    });
  });

  // 背景クリックで閉じる
  modal.addEventListener('click', e => {
    if (e.target === modal) closeGroupExpansion();
  });

  // 中央ページの大きな描画
  if (currentFile) renderViewerMainPage(currentFile, currentEntry, mainCanvas);
}

function toolDivider() {

function escapeHtml(s) {
  return s.replace(/[<>&"']/g, c => ({
    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ビューア中央の大きなページ描画
// 次/前ページをprefetch（getPageでPDF.js内部キャッシュに乗せる）
function prefetchViewerPage(members, idx) {
  if (idx < 0 || idx >= members.length) return;
  const m = members[idx];
  const file = state.files.find(f => f.id === m.fileId);
  if (file?._viewerPdf) {
    file._viewerPdf.then(pdf => pdf.getPage(m.pageNum)).catch(() => {});
  }
}

// 進行中のメインビュー描画タスクをキャンセルするための制御
let _viewerRenderTask = null;
let _viewerRenderSeq = 0;

async function renderViewerMainPage(file, entry, canvas) {
  if (_viewerRenderTask) {
    try { _viewerRenderTask.cancel(); } catch(e) {}
    _viewerRenderTask = null;
  }
  const seq = ++_viewerRenderSeq;

  try {
    if (!file._viewerPdf) {
      file._viewerPdf = pdfjsLib.getDocument({ data: file.bytes.slice(0) }).promise;
    }
    const pdf = await file._viewerPdf;
    if (seq !== _viewerRenderSeq) return;

    const page = await pdf.getPage(entry.pageNum);
    if (seq !== _viewerRenderSeq) return;

    const baseVp = page.getViewport({ scale: 1 });
    const targetH = 850;
    const logicalScale = Math.min(2.5, targetH / baseVp.height);
    state.viewerScale = logicalScale;
    entry._viewerScale = logicalScale;
    const rotation = entry.rotation || 0;
    const dpr = window.devicePixelRatio || 1;
    const renderBoost = 1.75;
    const renderScale = logicalScale * dpr * renderBoost;
    const renderViewport = page.getViewport({ scale: renderScale, rotation });
    const displayViewport = page.getViewport({ scale: logicalScale, rotation });

    canvas.width = renderViewport.width;
    canvas.height = renderViewport.height;
    canvas.style.width = displayViewport.width + 'px';
    canvas.style.height = displayViewport.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    const hiTask = page.render({ canvasContext: ctx, viewport: renderViewport });
    _viewerRenderTask = hiTask;
    await hiTask.promise;
    if (seq !== _viewerRenderSeq) return;

    const overlay = document.getElementById('viewer-ann-overlay');
    if (overlay) {
      overlay.width = displayViewport.width;
      overlay.height = displayViewport.height;
      overlay.style.width = '';
      overlay.style.height = '';
      setupAnnOverlay(overlay, entry);
      drawAllAnnotations(entry);
    }
    // 初回表示（ビューアを開いた直後 zoom=0）はdisplayViewport高さから自動フィット
    if (state.viewerZoom === 0) {
      const viewerMain = document.querySelector('.viewer-main');
      const contentH = displayViewport.height; // 論理ピクセル高さ（padding込み前）
      if (viewerMain && contentH > 0) {
        const availH = viewerMain.clientHeight - 64; // padding 32px×2
        const fitZ = Math.floor((availH / contentH) * 10) / 10;
        applyViewerZoom(Math.max(0.25, Math.min(4.0, fitZ)), true);
      } else {
        applyViewerZoom(0.9, true);
      }
    } else {
      applyViewerZoom(state.viewerZoom, true);
    }

    // 次ページ先読み
    if (entry.pageNum + 1 <= file.pdf.numPages) {
      pdf.getPage(entry.pageNum + 1).catch(() => {});
    }
  } catch (e) {
    if (e?.name !== 'RenderingCancelledException') {
      console.warn('view render fail:', e);
    }
  }
}

// ビューア内のズーム倍率を適用（CSS transform で表示エリアだけスケール）
function applyViewerZoom(z, silent = false) {
  // 範囲制限
  z = Math.max(0.25, Math.min(4.0, z));
  // 小数誤差をまるめ
  z = Math.round(z * 100) / 100;
  state.viewerZoom = z;
  const pageWrap = document.getElementById('viewer-page-wrap');
  if (pageWrap) {
    pageWrap.style.transform = (z !== 1.0) ? `scale(${z})` : '';
  }
  // パーセント表示更新
  const pct = document.querySelector('.viewer-zoom-pct');
  if (pct) pct.textContent = Math.round(z * 100) + '%';
}

// ── ビューア用アクション ─────────────────────────────
function rotateCurrent(deg) {
  const members = clampViewerMemberIdx();
  if (!members) return;
  const cur = members[state.viewerMemberIdx];
  // 回転前のキャンバスサイズを取得（ビューア座標系）
  const overlay = document.getElementById('viewer-ann-overlay');
  if (overlay && overlay.width > 0 && overlay.height > 0) {
    const W = overlay.width;
    const H = overlay.height;
    const norm = ((deg % 360) + 360) % 360;
    rotateAnnotationsForEntry(cur.p, norm, W, H);
  }
  cur.p.rotation = (((cur.p.rotation || 0) + deg) % 360 + 360) % 360;
  renderExpansionModal();
  refreshUI();
}

// 注釈の座標を回転（ページの回転に追従させる）
// deg: 回転量(0/90/180/270のいずれか), W/H: 回転前のキャンバス幅・高さ
function rotateAnnotationsForEntry(entry, deg, W, H) {
  if (!entry || !entry.uid) return;
  const anns = state.annotations[entry.uid];
  if (!anns || anns.length === 0) return;
  if (deg === 0) return;

  const rotPoint = (x, y) => {
    if (deg === 90)  return { x: H - y, y: x };       // 時計回り90
    if (deg === 270) return { x: y, y: W - x };       // 反時計回り90 (=270)
    if (deg === 180) return { x: W - x, y: H - y };   // 180
    return { x, y };
  };

  for (const a of anns) {
    if (a.type === 'rect' || a.type === 'highlight' || a.type === 'stamp') {
      // 矩形：左上と右下を計算してから新しい矩形に
      const x1 = a.x, y1 = a.y;
      const x2 = a.x + a.w, y2 = a.y + a.h;
      const p1 = rotPoint(x1, y1);
      const p2 = rotPoint(x2, y2);
      a.x = Math.min(p1.x, p2.x);
      a.y = Math.min(p1.y, p2.y);
      a.w = Math.abs(p2.x - p1.x);
      a.h = Math.abs(p2.y - p1.y);
      // 印鑑は向きも回転
      if (a.type === 'stamp') {
        a.rotation = (((a.rotation || 0) + deg) % 360 + 360) % 360;
      }
    } else if (a.type === 'line' || a.type === 'arrow') {
      const p1 = rotPoint(a.x, a.y);
      const p2 = rotPoint(a.x2, a.y2);
      a.x = p1.x; a.y = p1.y;
      a.x2 = p2.x; a.y2 = p2.y;
    } else if (a.type === 'text') {
      // テキスト: 基準点を回転 + 文字の向きも回転
      const p = rotPoint(a.x, a.y);
      a.x = p.x;
      a.y = p.y;
      a.rotation = (((a.rotation || 0) + deg) % 360 + 360) % 360;
    } else if (a.type === 'polygon') {
      if (a.points) {
        a.points = a.points.map(pt => rotPoint(pt.x, pt.y));
      }
    }
  }
}

function duplicateCurrentViewerPage() {
  const members = clampViewerMemberIdx();
  if (!members) return;
  const cur = members[state.viewerMemberIdx];
  const original = cur.p;
  // 同じ groupId で同じ座標の複製（uidは新規）
  const copy = {
    ...original,
    uid: 'pg_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8),
  };
  // 注釈もディープコピー
  if (state.annotations[original.uid]) {
    state.annotations[copy.uid] = state.annotations[original.uid].map(a => ({...a, id: Date.now() + Math.random()}));
  }
  state.pageOrder.splice(cur.idx + 1, 0, copy);
  state.viewerMemberIdx++;
  renderExpansionModal();
  refreshUI();
}

async function deleteCurrentViewerPage() {
  const members = clampViewerMemberIdx();
  if (!members) return;
  let ok;
  if (members.length === 1) {
    ok = await confirmDelete('束の最後の1枚を削除すると束自体がなくなります。よろしいですか？', 'ページを削除');
  } else {
    ok = await confirmDelete(`このページ（${state.viewerMemberIdx + 1}/${members.length}枚目）を削除しますか？`, 'ページを削除');
  }
  if (!ok) return;
  const cur = members[state.viewerMemberIdx];
  state.pageOrder.splice(cur.idx, 1);
  const newMembers = state.pageOrder.filter(p => p.groupId === state.expandedGroupId);
  if (newMembers.length === 0) {
    closeGroupExpansion();
    refreshUI();
    return;
  }
  if (state.viewerMemberIdx >= newMembers.length) state.viewerMemberIdx = newMembers.length - 1;
  renderExpansionModal();
  refreshUI();
}

async function extractCurrentViewerPage() {
  const members = clampViewerMemberIdx();
  if (!members) return;
  const cur = members[state.viewerMemberIdx];
  const entry = cur.p;

  // 束から独立させてページ一覧に出す
  const idx = cur.idx;
  if (members.length === 1) {
    // 最後の1枚ならgroupIdを外すだけ
    entry.groupId = null;
  } else {
    // groupIdを外して独立ページに
    entry.groupId = null;
    // ページ一覧上で少しずらして表示
    entry.x = (entry.x || 0) + 20;
    entry.y = (entry.y || 0) + 20;
  }
  // ビューアのメンバーインデックスを調整
  if (state.viewerMemberIdx >= members.length - 1) {
    state.viewerMemberIdx = Math.max(0, state.viewerMemberIdx - 1);
  }
  const newMembers = state.pageOrder.filter(p => p.groupId === state.expandedGroupId);
  if (newMembers.length === 0) {
    closeGroupExpansion();
  } else {
    renderExpansionModal();
  }
  refreshUI();
  scheduleSave();
  statusText.textContent = '取り出しました';
}

// Esc / 矢印キーでビューア操作
document.addEventListener('keydown', e => {
  if (!state.expandedGroupId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Escape') {
    closeGroupExpansion();
  } else if (e.key === 'ArrowLeft') {
    if (state.viewerMemberIdx > 0) {
      state.viewerMemberIdx--;
      renderExpansionModal();
    }
  } else if (e.key === 'ArrowRight') {
    const m = getExpandedMembers();
    if (state.viewerMemberIdx < m.length - 1) {
      state.viewerMemberIdx++;
      renderExpansionModal();
    }
  }
});


// ── Export ────────────────────────────────────────────
// （ボタンのリスナーは openExportDialog として後で登録される）

async function exportMerged() {
  const btn = document.getElementById('btn-export');
  const origLabel = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ 結合中...';
  statusText.textContent = '結合中...';

  try {
    const { PDFDocument } = PDFLib;
    const outDoc = await PDFDocument.create();

    // 各ファイルのpdf-libドキュメントをキャッシュ
    const docCache = new Map();
    async function getSrcDoc(fileId) {
      if (docCache.has(fileId)) return docCache.get(fileId);
      const file = state.files.find(f => f.id === fileId);
      if (!file) return null;
      const doc = await PDFDocument.load(file.bytes.slice(0));
      docCache.set(fileId, doc);
      return doc;
    }

    for (const entry of state.pageOrder) {
        if (!entry.included) continue;
        const srcDoc = await getSrcDoc(entry.fileId);
        if (!srcDoc) continue;
        const [p] = await outDoc.copyPages(srcDoc, [entry.pageNum - 1]);
        outDoc.addPage(p);
      }

    if (outDoc.getPageCount() === 0) {
      throw new Error('出力するページがありません');
    }

    const pdfBytes = await outDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `merged_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    statusText.textContent = `結合完了（${outDoc.getPageCount()}ページ）`;
  } catch (err) {
    console.error(err);
    alert('結合エラー: ' + err.message);
    statusText.textContent = 'エラー';
  } finally {
    btn.disabled = false;
    btn.innerHTML = origLabel;
  }
}

// ════════════════════════════════════════════════════
// ページ操作機能（取り出し/複製/回転/分割/削除）
// ════════════════════════════════════════════════════

// 全選択 / 解除
function actSelectAll() {
  state.pageOrder.forEach((_, idx) => state.selectedPageIdxs.add(idx));
  refreshUI();
}

function actDeselectAll() {
  state.selectedPageIdxs.clear();
  refreshUI();
}

// グループ化
function actGroup() {
  if (state.selectedPageIdxs.size < 2) {
    alert('2ページ以上を選択してください');
    return;
  }
  const idxs = [...state.selectedPageIdxs].sort((a, b) => a - b);
  const gid = 'g_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
  idxs.forEach(i => {
    if (state.pageOrder[i]) state.pageOrder[i].groupId = gid;
  });
  // 先頭ページの位置に全員を集める（スタック表示用）
  const firstEntry = state.pageOrder[idxs[0]];
  const baseX = firstEntry.x || 40;
  const baseY = firstEntry.y || 40;
  const groupPages = state.pageOrder.filter(p => p.groupId === gid);
  groupPages.forEach(p => { p.x = baseX; p.y = baseY; });
  state.selectedPageIdxs.clear();
  refreshUI();
}

// グループ解除
function actUngroup() {
  if (state.selectedPageIdxs.size === 0) return;
  // 選択中のページが属する束のIDを集める
  const targetGroupIds = new Set();
  state.selectedPageIdxs.forEach(idx => {
    const entry = state.pageOrder[idx];
    if (entry && entry.groupId) targetGroupIds.add(entry.groupId);
  });
  if (targetGroupIds.size === 0) {
    alert('選択ページはどれもグループに属していません');
    return;
  }
  // 各束のメンバー全員を解除し、横一列に並べる
  let count = 0;
  targetGroupIds.forEach(gid => {
    const members = state.pageOrder.filter(p => p.groupId === gid);
    if (members.length === 0) return;
    // 元の束の位置を起点に、1段5枚で並べ直す
    const baseX = members[0].x || 40;
    const baseY = members[0].y || 40;
    const SPACING_X = CARD_W + 24;
    const SPACING_Y = CARD_H + 24;
    const COLS = 5;
    members.forEach((p, i) => {
      p.groupId = null;
      p.x = baseX + (i % COLS) * SPACING_X;
      p.y = baseY + Math.floor(i / COLS) * SPACING_Y;
      count++;
    });
  });
  state.selectedPageIdxs.clear();
  refreshUI();
}

// 削除
async function actDelete() {
  if (state.selectedPageIdxs.size === 0) return;
  // 選択中のページが属する束のメンバー全員を削除対象に含める
  const targetIdxs = new Set(state.selectedPageIdxs);
  const targetGroupIds = new Set();
  state.selectedPageIdxs.forEach(idx => {
    const entry = state.pageOrder[idx];
    if (entry && entry.groupId) targetGroupIds.add(entry.groupId);
  });
  state.pageOrder.forEach((p, i) => {
    if (p.groupId && targetGroupIds.has(p.groupId)) targetIdxs.add(i);
  });
  const totalCount = targetIdxs.size;
  const groupCount = targetGroupIds.size;
  let msg;
  if (groupCount > 0) {
    msg = `選択した束を含む ${totalCount} ページをすべて削除しますか？`;
  } else {
    msg = `選択した ${totalCount} ページを削除しますか？`;
  }
  const ok = await confirmDelete(msg, 'ページを削除');
  if (!ok) return;

  // 削除対象のファイルをゴミ箱へ（そのファイルの全ページが削除対象の場合のみfileを除去）
  const deletedFileIds = new Set();
  [...targetIdxs].forEach(idx => {
    const p = state.pageOrder[idx];
    if (p) deletedFileIds.add(p.fileId);
  });
  deletedFileIds.forEach(fileId => {
    const file = state.files.find(f => f.id === fileId);
    if (!file) return;
    const allPageIdxsOfFile = [];
    state.pageOrder.forEach((p, i) => { if (p.fileId === fileId) allPageIdxsOfFile.push(i); });
    const allDeleted = allPageIdxsOfFile.every(i => targetIdxs.has(i));
    if (allDeleted) {
      const pages = allPageIdxsOfFile.map(i => state.pageOrder[i]);
      trash.push({ file, pages, deletedAt: Date.now() });
      state.files = state.files.filter(f => f.id !== fileId);
    }
  });

  state.pageOrder = state.pageOrder.filter((_, idx) => !targetIdxs.has(idx));
  state.selectedPageIdxs.clear();
  refreshUI();
  updateTrashUI();
  scheduleSave();
}

// 複製
function actDuplicate() {
  if (state.selectedPageIdxs.size === 0) return;
  const idxs = [...state.selectedPageIdxs].sort((a, b) => a - b);
  const newIdxs = [];
  idxs.forEach(idx => {
    const original = state.pageOrder[idx];
    const newUid = 'pg_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    const copy = {
      ...original,
      uid: newUid,
      x: (original.x || 0) + 20,
      y: (original.y || 0) + 20,
    };
    if (state.annotations[original.uid]) {
      state.annotations[newUid] = state.annotations[original.uid].map(a => ({...a, id: Date.now() + Math.random()}));
    }
    state.pageOrder.push(copy);
    newIdxs.push(state.pageOrder.length - 1);
  });
  // 複製後は複製したページを選択状態にする（Deleteがすぐ効くように）
  state.selectedPageIdxs.clear();
  newIdxs.forEach(i => state.selectedPageIdxs.add(i));
  refreshUI();
}

// 回転（左90 / 右90 / 180）
function rotateSelected(deg) {
  if (state.selectedPageIdxs.size === 0) return;
  // 対象を集める：選択中のページ + 同じ束に属するメンバー全員
  const targetIdxs = new Set(state.selectedPageIdxs);
  state.selectedPageIdxs.forEach(idx => {
    const entry = state.pageOrder[idx];
    if (entry && entry.groupId) {
      // 同じ束のメンバー全員を追加
      state.pageOrder.forEach((p, i) => {
        if (p.groupId === entry.groupId) targetIdxs.add(i);
      });
    }
  });
  targetIdxs.forEach(idx => {
    const entry = state.pageOrder[idx];
    if (!entry) return;
    entry.rotation = (((entry.rotation || 0) + deg) % 360 + 360) % 360;
  });
  refreshUI();
}

// 取り出し（選択ページのみで新規PDFを作成してダウンロード）
async function actExtract() {
  if (state.selectedPageIdxs.size === 0) return;

  statusText.textContent = '取り出し中...';
  try {
    await waitForStampImages();
    const { PDFDocument, degrees } = PDFLib;
    const outDoc = await PDFDocument.create();
    const docCache = new Map();

    const orderRank = computeOrderRank();
    const selectedIdxs = [...state.selectedPageIdxs]
      .filter(i => orderRank.has(i))
      .sort((a, b) => orderRank.get(a) - orderRank.get(b));
    for (const idx of selectedIdxs) {
      const entry = state.pageOrder[idx];
      if (!entry) continue;
      let srcDoc = docCache.get(entry.fileId);
      if (!srcDoc) {
        const file = state.files.find(f => f.id === entry.fileId);
        if (!file) continue;
        srcDoc = await PDFDocument.load(file.bytes.slice(0));
        docCache.set(entry.fileId, srcDoc);
      }
      const [p] = await outDoc.copyPages(srcDoc, [entry.pageNum - 1]);
      if (entry.rotation) {
        const current = p.getRotation().angle;
        p.setRotation(degrees((current + entry.rotation) % 360));
      }
      const addedPage = outDoc.addPage(p);
      await bakeAnnotationsIntoPage(addedPage, entry, outDoc);
    }

    const bytes = await outDoc.save();
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `extracted_${selectedIdxs.length}pages_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    statusText.textContent = `取り出し完了（${selectedIdxs.length}ページ）`;
  } catch (e) {
    console.error(e);
    alert('取り出しエラー: ' + e.message);
    statusText.textContent = 'エラー';
  }
}

// 分割（選択ページの直前で分割し、前半・後半の2PDFを保存）
async function actSplit() {
  if (state.selectedPageIdxs.size === 0) return;
  if (state.selectedPageIdxs.size > 1) {
    if (!confirm('複数の分割点が指定されています。それぞれの位置で分割し、複数のPDFに分けて保存します。よろしいですか？')) return;
  }

  statusText.textContent = '分割中...';
  try {
    const { PDFDocument, degrees } = PDFLib;
    const docCache = new Map();
    async function getSrc(fileId) {
      if (docCache.has(fileId)) return docCache.get(fileId);
      const file = state.files.find(f => f.id === fileId);
      if (!file) return null;
      const d = await PDFDocument.load(file.bytes.slice(0));
      docCache.set(fileId, d);
      return d;
    }

    // 位置順（Y→X）の配列を作る
    const orderRank = computeOrderRank();
    const orderedEntries = [...orderRank.entries()]
      .sort((a, b) => a[1] - b[1])
      .map(([idx]) => state.pageOrder[idx])
      .filter(p => p && p.included);

    // 分割点：選択されたページが orderedEntries の何番目か
    const cutRanks = [...state.selectedPageIdxs]
      .filter(i => orderRank.has(i))
      .map(i => {
        // orderedEntries 中のインデックス
        return orderedEntries.indexOf(state.pageOrder[i]);
      })
      .filter(i => i >= 0)
      .sort((a, b) => a - b);

    const segments = [];
    let prev = 0;
    for (const cp of cutRanks) {
      if (cp > prev) segments.push(orderedEntries.slice(prev, cp));
      prev = cp;
    }
    if (prev < orderedEntries.length) segments.push(orderedEntries.slice(prev));

    const validSegments = segments.filter(seg => seg.length > 0);
    if (validSegments.length < 2) {
      alert('分割できません（先頭ページが選択されているか、含まれるページが足りません）');
      statusText.textContent = '準備完了';
      return;
    }

    const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
    await waitForStampImages();
    for (let segIdx = 0; segIdx < validSegments.length; segIdx++) {
      const seg = validSegments[segIdx];
      const outDoc = await PDFDocument.create();
      for (const entry of seg) {
        const srcDoc = await getSrc(entry.fileId);
        if (!srcDoc) continue;
        const [p] = await outDoc.copyPages(srcDoc, [entry.pageNum - 1]);
        if (entry.rotation) {
          const cur = p.getRotation().angle;
          p.setRotation(degrees((cur + entry.rotation) % 360));
        }
        const addedPage = outDoc.addPage(p);
        await bakeAnnotationsIntoPage(addedPage, entry, outDoc);
      }
      if (outDoc.getPageCount() === 0) continue;
      const bytes = await outDoc.save();
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `split_${segIdx + 1}of${validSegments.length}_${dateStr}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
      await new Promise(res => setTimeout(res, 200));
    }
    statusText.textContent = `分割完了（${validSegments.length}ファイル）`;
  } catch (e) {
    console.error(e);
    alert('分割エラー: ' + e.message);
    statusText.textContent = 'エラー';
  }
}

// ────── 出力選択ダイアログ ──────
// 出力対象ページのインデックス集合を取得
// 選択がある場合：選択中のページ（束のメンバー含む）
// 選択がない場合：すべての出力ON ページ
function getExportTargetIdxs() {
  const orderRank = computeOrderRank();
  if (state.selectedPageIdxs.size > 0) {
    // 選択中のページ + 選択中の束のメンバー全員
    const target = new Set(state.selectedPageIdxs);
    const groupIds = new Set();
    state.selectedPageIdxs.forEach(i => {
      const e = state.pageOrder[i];
      if (e && e.groupId) groupIds.add(e.groupId);
    });
    state.pageOrder.forEach((p, i) => {
      if (p.groupId && groupIds.has(p.groupId)) target.add(i);
    });
    // 出力ONかつ orderRankに含まれているもののみ、位置順で
    return [...target]
      .filter(i => {
        const e = state.pageOrder[i];
        return e && e.included && orderRank.has(i);
      })
      .sort((a, b) => orderRank.get(a) - orderRank.get(b));
  } else {
    // 全選択なし → 出力ONのページ全部
    return [...orderRank.entries()]
      .sort((a, b) => a[1] - b[1])
      .map(([idx]) => idx)
      .filter(i => {
        const e = state.pageOrder[i];
        return e && e.included;
      });
  }
}

// ────── JPEG出力 ──────
async function exportAsJpeg(quality = 0.92) {
  const btn = document.getElementById('btn-export');
  const origLabel = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '⏳ JPEG生成中...';
  statusText.textContent = 'JPEG生成中...';

  try {
    await waitForStampImages();

    // 出力対象（選択中なら選択範囲、なければ全出力ON）
    const orderedIdxs = getExportTargetIdxs();
    const outputs = []; // {name, blob}

    let pageNo = 0;
    for (const idx of orderedIdxs) {
      const entry = state.pageOrder[idx];
      if (!entry || !entry.included) continue;
      const file = state.files.find(f => f.id === entry.fileId);
      if (!file) continue;
      pageNo++;
      statusText.textContent = `JPEG生成中... (${pageNo})`;

      try {
        const page = await file.pdf.getPage(entry.pageNum);
        const rotation = entry.rotation || 0;
        // 最高品質：scale 4.0（300DPI相当）
        const scale = 3.0;
        const viewport = page.getViewport({ scale, rotation });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        // 白背景
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        await page.render({ canvasContext: ctx, viewport }).promise;

        // 注釈を描画（renderAnnotationLayerForEntry を使うがcanvasに直接合成）
        const annotations = state.annotations[entry.uid] || [];
        if (annotations.length > 0) {
          // 注釈は viewerScale × 回転後座標系 で保存されている
          const viewerScale = entry._viewerScale || (() => {
            const baseVp0 = page.getViewport({ scale: 1 });
            const targetH = 850;
            return Math.min(2.5, targetH / baseVp0.height);
          })();
          ctx.save();
          ctx.scale(scale / viewerScale, scale / viewerScale);
          for (const a of annotations) {
            if (a._editing) continue;
            annDraw(ctx, a);
          }
          ctx.restore();
        }

        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
        const baseName = (file.name || 'page').replace(/\.[^.]+$/, '');
        const name = orderedIdxs.length === 1
          ? `${baseName}.jpg`
          : `${String(pageNo).padStart(3, '0')}_${baseName}_p${entry.pageNum}.jpg`;
        outputs.push({ name, blob });
      } catch (e) {
        console.warn('ページ描画失敗:', entry, e);
      }
    }

    if (outputs.length === 0) throw new Error('出力するページがありません');

    if (outputs.length === 1) {
      // 1枚はそのままダウンロード
      const o = outputs[0];
      const url = URL.createObjectURL(o.blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = o.name;
      a.click();
      URL.revokeObjectURL(url);
    } else {
      // 複数枚はZIPに
      statusText.textContent = 'ZIP圧縮中...';
      if (typeof JSZip === 'undefined') throw new Error('JSZipが読み込めません');
      const zip = new JSZip();
      outputs.forEach(o => zip.file(o.name, o.blob));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `merged_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.zip`;
      a.click();
      URL.revokeObjectURL(url);
    }
    statusText.textContent = `JPEG出力完了（${outputs.length}枚）`;
  } catch (err) {
    console.error(err);
    alert('JPEG出力エラー: ' + err.message);
    statusText.textContent = 'エラー';
  } finally {
    btn.disabled = false;
    btn.innerHTML = origLabel;
  }
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.target.isContentEditable && e.target.contentEditable === 'true') return;
  const k = e.key.toLowerCase();
  // Ctrl+Z / Ctrl+Y / Ctrl+Shift+Z（ビューア表示中は注釈用Undoが優先される）
  if (!state.expandedGroupId && (e.ctrlKey || e.metaKey)) {
    if (k === 'z' && !e.shiftKey) {
      e.preventDefault();
      doUndo();
      return;
    }
    if (k === 'y' || (k === 'z' && e.shiftKey)) {
      e.preventDefault();
      doRedo();
      return;
    }
  }
  // Esc: 選択解除
  if (e.key === 'Escape') {
    state.selectedPageIdxs.clear();
    refreshUI();
    return;
  }
  // Ctrl+A: 全選択
  if ((e.ctrlKey || e.metaKey) && k === 'a') {
    e.preventDefault();
    actSelectAll();
    return;
  }
  // Delete: 削除
  if (e.key === 'Delete' || e.key === 'Backspace') {

    if (state.expandedGroupId) { // ビューア表示中
      if (state.annSelectedId) return; // 注釈選択中はページ削除しない
