// ── 一覧表示モーダル ──
function showAllPagesGrid() {
  // 既存があれば閉じる
  const existing = document.getElementById('all-pages-grid-modal');
  if (existing) existing.remove();

  const members = getExpandedMembers();
  if (members.length === 0) return;

  const modal = document.createElement('div');
  modal.id = 'all-pages-grid-modal';
  modal.style.cssText = `
    position: fixed; inset: 0;
    background: rgba(21,19,15,0.92);
    z-index: 2500;
    display: flex; flex-direction: column;
    backdrop-filter: blur(4px);
  `;

  // ヘッダー
  const header = document.createElement('div');
  header.style.cssText = `
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    color: white;
  `;
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="font-family:Georgia,serif;font-size:18px;font-style:italic;font-weight:600;">一覧表示</div>
      <span style="font-family:monospace;font-size:11px;color:#a8a293;">${members.length} ページ</span>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#cfc8b8;cursor:pointer;">
        <span>サイズ:</span>
        <input type="range" id="grid-size" min="120" max="320" value="180" style="width:120px;">
      </label>
      <button id="grid-close" style="
        background: transparent; border: 1px solid rgba(255,255,255,0.3);
        color: white; padding: 6px 14px; border-radius: 3px; cursor: pointer;
        font-family: inherit; font-size: 12px;
      ">閉じる (Esc)</button>
    </div>
  `;
  modal.appendChild(header);

  // グリッド本体
  const gridWrap = document.createElement('div');
  gridWrap.style.cssText = `
    flex: 1; overflow-y: auto;
    padding: 20px 24px;
  `;
  const grid = document.createElement('div');
  grid.id = 'grid-content';
  grid.style.cssText = `
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  `;
  gridWrap.appendChild(grid);
  modal.appendChild(gridWrap);

  document.body.appendChild(modal);

  // サムネをグリッドに描画
  members.forEach((m, mi) => {
    const cell = document.createElement('div');
    cell.style.cssText = `
      background: white;
      border: 2px solid ${mi === state.viewerMemberIdx ? '#D94B2B' : 'transparent'};
      border-radius: 3px;
      padding: 8px;
      cursor: grab;
      transition: all 0.15s;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
      ${m.p.included ? '' : 'opacity: 0.4;'}
    `;
    cell.dataset.memberIdx = mi;
    const wrap = document.createElement('div');
    wrap.style.cssText = `
      width: 100%;
      overflow: hidden;
      background: #f8f5ec;
      position: relative;
    `;
    const cv = document.createElement('canvas');
    cv.style.cssText = 'width:100%;height:auto;display:block;';
    wrap.appendChild(cv);
    cell.appendChild(wrap);

    // 高解像度でcanvasに直接描画
    (async () => {
      const file = state.files.find(f => f.id === m.p.fileId);
      if (!file || !file.pdf) return;
      try {
        const page = await file.pdf.getPage(m.p.pageNum);
        const rotation = m.p.rotation || 0;
        const baseVp = page.getViewport({ scale: 1, rotation });
        // グリッドセル幅に合わせてスケール（280pxを基準）
        const scale = 280 / baseVp.width;
        const viewport = page.getViewport({ scale, rotation });
        cv.width = Math.round(viewport.width);
        cv.height = Math.round(viewport.height);
        const ctx = cv.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
      } catch(e) {
        console.warn('grid thumb fail:', e);
      }
    })();

    const label = document.createElement('div');
    label.style.cssText = `
      font-family: monospace;
      font-size: 12px;
      color: #57523F;
      margin-top: 6px;
      ${mi === state.viewerMemberIdx ? 'color: #D94B2B; font-weight: 700;' : ''}
    `;
    label.textContent = String(mi + 1);
    cell.appendChild(label);

    // ホバー
    cell.addEventListener('mouseenter', () => {
      if (mi !== state.viewerMemberIdx) {
        cell.style.borderColor = 'rgba(217, 75, 43, 0.4)';
        cell.style.transform = 'translateY(-2px)';
        cell.style.boxShadow = '0 6px 16px rgba(0,0,0,0.3)';
      }
    });
    cell.addEventListener('mouseleave', () => {
      if (mi !== state.viewerMemberIdx) {
        cell.style.borderColor = 'transparent';
        cell.style.transform = 'translateY(0)';
        cell.style.boxShadow = 'none';
      }
    });

    // クリックでそのページに切替＋一覧閉じる
    cell.addEventListener('click', () => {
      if (gridDragging) { gridDragging = false; return; }
      state.viewerMemberIdx = mi;
      gridSelectedIdx = mi;
      close();
      renderExpansionModal();
    });

    // 右クリックメニュー
    cell.addEventListener('contextmenu', e => {
      // 一旦選択切替してから既存のコンテキストメニューを再利用
      state.viewerMemberIdx = mi;
      // セル選択を視覚的に更新
      grid.querySelectorAll('div').forEach(c => c.style.borderColor = 'transparent');
      cell.style.borderColor = '#D94B2B';
      showViewerContextMenu(e, mi);
    });

    // Pointer Eventsによる並び替え
    let cellDrag = null;
    cell.addEventListener('pointerdown', e => {
      if (e.button !== 0) return;
      cellDrag = { fromIdx: mi, moved: false, startX: e.clientX, startY: e.clientY, dropTarget: null, dropBefore: true };
      cell.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    cell.addEventListener('pointermove', e => {
      if (!cellDrag || cellDrag.fromIdx !== mi) return;
      if (!cellDrag.moved && (Math.abs(e.clientX - cellDrag.startX) > 4 || Math.abs(e.clientY - cellDrag.startY) > 4)) {
        cellDrag.moved = true;
        gridDragging = true;
        cell.style.opacity = '0.3';
        cell.style.cursor = 'grabbing';
      }
      if (!cellDrag.moved) return;
      const allCells = [...grid.querySelectorAll('[data-member-idx]')];
      allCells.forEach(c => c.style.boxShadow = '');
      cellDrag.dropTarget = null;
      const target = allCells.find(c => {
        if (c === cell) return false;
        const r = c.getBoundingClientRect();
        return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
      });
      if (target) {
        const r = target.getBoundingClientRect();
        const isLeft = (e.clientX - r.left) < r.width / 2;
        target.style.boxShadow = isLeft ? 'inset 4px 0 0 #D94B2B' : 'inset -4px 0 0 #D94B2B';
        cellDrag.dropTarget = parseInt(target.dataset.memberIdx, 10);
        cellDrag.dropBefore = isLeft;
      }
    });
    cell.addEventListener('pointerup', e => {
      if (!cellDrag || cellDrag.fromIdx !== mi) return;
      const ds = cellDrag;
      cellDrag = null;
      try { cell.releasePointerCapture(e.pointerId); } catch(_) {}
      cell.style.opacity = m.p.included ? '1' : '0.4';
      cell.style.cursor = 'grab';
      grid.querySelectorAll('[data-member-idx]').forEach(c => c.style.boxShadow = '');
      if (!ds.moved || ds.dropTarget === null) return;
      const insertAt = ds.dropBefore ? ds.dropTarget : ds.dropTarget + 1;
      if (ds.fromIdx === insertAt || ds.fromIdx === insertAt - 1) return;
      reorderViewerMembers(ds.fromIdx, insertAt);
      modal.remove();
      showAllPagesGrid();
    });
    cell.addEventListener('pointercancel', () => {
      cellDrag = null;
      cell.style.opacity = m.p.included ? '1' : '0.4';
      cell.style.cursor = 'grab';
      grid.querySelectorAll('[data-member-idx]').forEach(c => c.style.boxShadow = '');
    });

    grid.appendChild(cell);

    // PDFを描画
    const file = state.files.find(f => f.id === m.p.fileId);
    // (描画は上のIIFEで実施済み)
  });

  // サイズ調整
  const sizeSlider = header.querySelector('#grid-size');
  sizeSlider.addEventListener('input', e => {
    const size = parseInt(e.target.value, 10);
    grid.style.gridTemplateColumns = `repeat(auto-fill, minmax(${size}px, 1fr))`;
  });

  // 閉じる
  let gridDragging = false;
  const close = () => {
    modal.remove();
    document.removeEventListener('keydown', gridKeyHandler, true);
  };
  header.querySelector('#grid-close').addEventListener('click', close);
  // Esc/Deleteキー（captureフェーズで他より先に処理）
  let gridSelectedIdx = state.viewerMemberIdx;
  const gridKeyHandler = e => {
    if (!document.getElementById('all-pages-grid-modal')) {
      document.removeEventListener('keydown', gridKeyHandler, true);
      return;
    }
    if (e.key === 'Escape') {
      e.stopPropagation();
      close();
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (state.annSelectedId) return;
      e.preventDefault();
      e.stopPropagation();
      state.viewerMemberIdx = gridSelectedIdx;
      close();
      deleteCurrentViewerPage();
    }
  };
  document.addEventListener('keydown', gridKeyHandler, true);
}

// キーボードショートカット（ビューア表示中のみ）
document.addEventListener('keydown', e => {
  if (!state.expandedGroupId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // フォント解析モード（領域・スポイト）のEscキャンセル
  if (e.key === 'Escape' && fontAnalyzeMode !== 'all') {
    e.preventDefault();
    cancelFontAnalyzeMode();
    return;
  }
  // 多角形作成中
  if (polygonPoints && polygonPoints.length > 0) {
    if (e.key === 'Escape') { e.preventDefault(); cancelPolygon(); return; }
    if (e.key === 'Enter' && polygonPoints.length >= 3 && annCurrentEntry) {
      e.preventDefault(); finalizePolygon(annCurrentEntry); return;
    }
    if (e.key === 'Backspace') {
      // 直前の頂点を取り消し
      e.preventDefault();
      polygonPoints.pop();
      if (polygonPoints.length === 0) cancelPolygon();
      else if (annCurrentEntry) drawAllAnnotations(annCurrentEntry);
      return;
    }
  }
  const k = e.key.toLowerCase();
  // Ctrl+C / V / X / D （注釈のコピペ）
  if (e.ctrlKey || e.metaKey) {
    if (k === 'c') {
      if (state.annSelectedId) {
        e.preventDefault();
        if (annCopySelected()) statusText.textContent = '注釈をコピー';
        return;
      }
    } else if (k === 'v') {
      if (annClipboard && annCurrentEntry) {
        e.preventDefault();
        annPasteFromClipboard();
        statusText.textContent = '注釈をペースト';
        return;
      }
    } else if (k === 'x') {
      if (state.annSelectedId) {
        e.preventDefault();
        annCutSelected();
        statusText.textContent = '注釈をカット';
        return;
      }
    } else if (k === 'd') {
      if (state.annSelectedId) {
        e.preventDefault();
        annDuplicateSelected();
        statusText.textContent = '注釈を複製';
        return;
      }
    }
  }
  const map = { v:'select', r:'rect', t:'text', l:'line', a:'arrow', p:'polygon', h:'highlight', s:'stamp' };
  if (!e.ctrlKey && !e.metaKey && map[k]) {
    state.tool = map[k];
    state.annSelectedId = null;
    if (map[k] !== 'polygon') cancelPolygon();
    document.querySelectorAll('.ann-tool[data-tool]').forEach(b => {
      b.classList.toggle('active', b.dataset.tool === state.tool);
    });
    updateAnnOverlayCursor();
    if (annCurrentEntry) drawAllAnnotations(annCurrentEntry);
  } else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.annSelectedId) {
      e.preventDefault();
      annDeleteSelected();
    }
  } else if ((e.ctrlKey || e.metaKey) && k === 'z') {
    e.preventDefault();
    if (annCurrentEntry) {
      const anns = getEntryAnnotations(annCurrentEntry);
      if (anns.length) { anns.pop(); drawAllAnnotations(annCurrentEntry); }
    }
  }
});

// ════════════════════════════════════════════════════
// 永続化（IndexedDB）
// ════════════════════════════════════════════════════

const DB_NAME = 'pdf_merger_v1';
const DB_VERSION = 2; // バージョン維持
const STORE_NAME = 'state';
const THUMB_STORE = 'thumbs';
const STATE_KEY = 'workspace';

let dbInstance = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (dbInstance) { resolve(dbInstance); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
      if (!db.objectStoreNames.contains(THUMB_STORE)) {
        db.createObjectStore(THUMB_STORE);
      }
    };
    req.onsuccess = e => { dbInstance = e.target.result; resolve(dbInstance); };
    req.onerror = e => reject(e.target.error);
  });
}

// ファイルのハッシュキー（name+size+lastModified）
function fileThumbKey(file, pageNum, rotation) {
  return `${file.name}_${file.size}_${file.lastModified}_p${pageNum}_r${rotation}_s2`;
}

// サムネをIndexedDBに保存
async function saveThumbToDB(key, dataUrl) {
  try {
    const db = await openDB();
    const tx = db.transaction(THUMB_STORE, 'readwrite');
    tx.objectStore(THUMB_STORE).put(dataUrl, key);
  } catch(e) {}
}

// サムネをIndexedDBから取得
async function loadThumbFromDB(key) {
  try {
    const db = await openDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(THUMB_STORE, 'readonly');
      const r = tx.objectStore(THUMB_STORE).get(key);
      r.onsuccess = () => resolve(r.result || null);
      r.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function saveStateToDB(snapshot) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const r = store.put(snapshot, STATE_KEY);
    r.onsuccess = () => resolve();
    r.onerror = e => reject(e.target.error);
  });
}

async function loadStateFromDB() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const r = store.get(STATE_KEY);
    r.onsuccess = () => resolve(r.result || null);
    r.onerror = e => reject(e.target.error);
  });
}

async function clearStateFromDB() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    const r = store.delete(STATE_KEY);
    r.onsuccess = () => resolve();
    r.onerror = e => reject(e.target.error);
  });
}

// 状態のスナップショット作成（保存用）
function buildStateSnapshot() {
  return {
    files: state.files.map(f => ({
      id: f.id,
      name: f.name,
      size: f.size,
      bytes: f.bytes,  // ArrayBuffer
      thumbnail: f.thumbnail,
      pageCount: f.pageCount,
    })),
    pageOrder: state.pageOrder.map(p => ({...p})),
    annotations: state.annotations,
    groupNames: {...state.groupNames},
    trash: trash.map(t => ({
      file: { id: t.file.id, name: t.file.name, size: t.file.size, bytes: t.file.bytes, thumbnail: t.file.thumbnail, pageCount: t.file.pageCount },
      pages: t.pages.map(p => ({...p})),
    })),
    savedAt: Date.now(),
  };
}

// スナップショットから状態を復元
async function restoreStateFromSnapshot(snap) {
  if (!snap || !snap.files) return false;
  // PDF.jsドキュメントをロード（pdfプロパティ）
  state.files = [];
  for (const f of snap.files) {
    try {
      const pdf = await pdfjsLib.getDocument({ data: f.bytes.slice(0) }).promise;
      state.files.push({
        ...f,
        pdf,
      });
    } catch (e) {
      console.warn('PDF復元失敗:', f.name, e);
    }
  }
  state.pageOrder = (snap.pageOrder || []).map(p => ({...p}));
  state.annotations = snap.annotations || {};
  state.groupNames = snap.groupNames || {};
  // ゴミ箱を復元（ゴミ箱内は保存するがボードには表示しない）
  trash.length = 0;
  if (snap.trash && Array.isArray(snap.trash)) {
    for (const t of snap.trash) {
      try {
        const pdf = await pdfjsLib.getDocument({ data: t.file.bytes.slice(0) }).promise;
        trash.push({ file: { ...t.file, pdf }, pages: t.pages });
      } catch (_) {}
    }
  }
  refreshUI();
  updateTrashUI();
  return true;
}

// 自動保存（デバウンス）
let saveTimer = null;
let lastSaveTime = 0;
function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    saveTimer = null;
    if (state.files.length === 0 && trash.length === 0) {
      // 完全に空なら削除
      try {
        await clearStateFromDB();
      } catch (_) {}
      return;
    }
    try {
      const snap = buildStateSnapshot();
      await saveStateToDB(snap);
      lastSaveTime = Date.now();
      const t = new Date(lastSaveTime);
      const hh = String(t.getHours()).padStart(2, '0');
      const mm = String(t.getMinutes()).padStart(2, '0');
      const ss = String(t.getSeconds()).padStart(2, '0');
      statusText.textContent = `保存しました (${hh}:${mm}:${ss})`;
    } catch (e) {
      console.warn('保存失敗:', e);
      statusText.textContent = '保存失敗';
    }
  }, 300);
}

// refreshUI と drawAllAnnotations にフックする代わりに、
// 共通保存トリガーは scheduleSave を直接呼ぶ。
// ここでは、定期的に保存を走らせるバックアップ機構を用意する（5秒に1回チェック）
let lastSnapshotJson = '';

// ── Undo/Redo 履歴 ──
const HISTORY_LIMIT = 50;
const undoStack = [];
const redoStack = [];
let isApplyingHistory = false;

function pushHistorySnapshot(jsonStr) {
  undoStack.push(jsonStr);
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  // 新しい操作が入ったら redo はクリア
  redoStack.length = 0;
  updateHistoryButtons();
}

function applyHistoryState(jsonStr) {
  try {
    const data = JSON.parse(jsonStr);
    state.pageOrder = data.po || [];
    state.annotations = data.ann || {};
    state.groupNames = data.gn || {};
    state.selectedPageIdxs.clear();
    isApplyingHistory = true;
    refreshUI();
    // ビューア表示中なら再描画
    if (state.expandedGroupId) {
      renderExpansionModal();
    }
    setTimeout(() => { isApplyingHistory = false; }, 50);
  } catch (e) {
    console.warn('履歴復元失敗:', e);
  }
}

function doUndo() {
  if (undoStack.length < 2) return; // 最低でも初期+1個必要
  const current = undoStack.pop();
  redoStack.push(current);
  const prev = undoStack[undoStack.length - 1];
  // 比較ベースを更新して、applyによる変更を新しい変更扱いしないように
  lastSnapshotJson = prev;
  applyHistoryState(prev);
  updateHistoryButtons();
  statusText.textContent = '元に戻しました';
}

function doRedo() {
  if (redoStack.length === 0) return;
  const next = redoStack.pop();
  undoStack.push(next);
  lastSnapshotJson = next;
  applyHistoryState(next);
  updateHistoryButtons();
  statusText.textContent = 'やり直しました';
}

function updateHistoryButtons() {
  const undoBtn = document.getElementById('btn-undo');
  const redoBtn = document.getElementById('btn-redo');
  if (undoBtn) undoBtn.disabled = undoStack.length < 2;
  if (redoBtn) redoBtn.disabled = redoStack.length === 0;
}

// 1.5秒ごとにチェック → 変更あれば履歴+保存
setInterval(() => {
  if (state.files.length === 0) {
    // 全クリア時は履歴も初期化
    if (undoStack.length > 0) {
      undoStack.length = 0;
      redoStack.length = 0;
      updateHistoryButtons();
    }
    return;
  }
  try {
    // pageOrderの永続化対象プロパティのみを抽出（_viewerScaleなど一時プロパティを除外）
    const lightPo = state.pageOrder.map(p => ({
      uid: p.uid, fileId: p.fileId, pageNum: p.pageNum,
      included: p.included, rotation: p.rotation,
      groupId: p.groupId, x: p.x, y: p.y,
    }));
    const lite = JSON.stringify({
      po: lightPo,
      ann: state.annotations,
      gn: state.groupNames,
      fileIds: state.files.map(f => f.id),
    });
    if (lite !== lastSnapshotJson) {
      // 履歴を巻き戻している最中の変更は記録しない
      if (!isApplyingHistory) {
        if (undoStack.length === 0) {
          undoStack.push(lite);
        } else {
          pushHistorySnapshot(lite);
        }
        updateHistoryButtons();
      }
      lastSnapshotJson = lite;
      scheduleSave();
    }
  } catch (_) {}
}, 1500);

// 起動時に復元
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const snap = await loadStateFromDB();
    if (snap && ((snap.files && snap.files.length > 0) || (snap.trash && snap.trash.length > 0))) {
      statusText.textContent = '前回の作業を復元中...';
      const ok = await restoreStateFromSnapshot(snap);
      if (ok) {
        const t = new Date(snap.savedAt);
        const hh = String(t.getHours()).padStart(2, '0');
        const mm = String(t.getMinutes()).padStart(2, '0');
        statusText.textContent = `前回の作業を復元 (${hh}:${mm} 時点)`;
        // 注釈付きサムネを再描画（印鑑画像ロード待ちのため遅延）
        setTimeout(() => {
          state.pageOrder.forEach(entry => {
            const anns = getEntryAnnotations(entry);
            if (anns.length > 0) {
              refreshThumbWithAnnotations(entry);
            }
          });
        }, 2000);
      }
    }
  } catch (e) {
    console.warn('復元失敗:', e);
  }
});

// btn-clear で削除する際、IndexedDBからもクリア
const __originalClear = document.getElementById('btn-clear');
if (__originalClear) __originalClear.addEventListener('click', async () => {
  setTimeout(async () => {
    if (state.files.length === 0) {
      try { await clearStateFromDB(); } catch (_) {}
    }
  }, 100);
});

  if (!confirm(`ゴミ箱内の${trash.length}件を完全に削除しますか？`)) return;
  trash.length = 0;
  updateTrashUI();
});
updateTrashUI();
